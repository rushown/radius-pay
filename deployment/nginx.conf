server {
    listen 80;
    server_name radiuspay.app www.radiuspay.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name radiuspay.app www.radiuspay.app;

    ssl_certificate     /etc/letsencrypt/live/radiuspay.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/radiuspay.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Frontend (React build)
    root /var/www/radiuspay/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to Node backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Rate limit at nginx level too
        limit_req zone=api burst=20 nodelay;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
    }
}

# Rate limit zone
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;